name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ~/shopsmart
            cd ~/shopsmart

            # If it's a git repo, pull, else clone
            if [ -d ".git" ]; then
              git pull origin main
            else
              git clone https://github.com/${{ github.repository }}.git . || echo "Repository might already exist"
            fi

            # Backend
            cd server
            npm install
            # Idempotent PM2 start/restart
            pm2 restart shopsmart-backend || pm2 start src/index.js --name shopsmart-backend

            # Frontend
            cd ../client
            npm install
            npm run build

            # Idempotent frontend deployment
            sudo mkdir -p /var/www/shopsmart/client
            sudo cp -r dist/* /var/www/shopsmart/client/
            sudo systemctl restart nginx || echo "Nginx not installed or running, skipping..."